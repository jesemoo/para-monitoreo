<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAlerta - Bitácora de Confort Térmico</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white/80 backdrop-blur-md shadow-2xl rounded-3xl p-8 max-w-lg w-full border border-emerald-100/50 transition-all duration-300">
        
        <div class="text-center mb-8">
            <span class="bg-emerald-100 text-emerald-800 text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wider">Proyecto EcoAlerta</span>
            <h1 class="text-2xl font-bold text-slate-800 mt-2">Bitácora de Monitoreo</h1>
            <p class="text-slate-500 text-sm mt-1">Ayúdanos a medir la comodidad térmica percibida.</p>
            
            <div class="w-full bg-slate-100 h-2 rounded-full mt-6 relative overflow-hidden">
                <div id="progressBar" class="bg-emerald-500 h-full w-1/4 transition-all duration-500 ease-in-out"></div>
            </div>
        </div>

        <form id="surveyForm" class="space-y-6">
            
            <div id="step1" class="step-content active space-y-4">
                <label class="block text-sm font-semibold text-slate-700">¿Cómo te identificas?</label>
                <input type="text" id="nombre_usuario" required placeholder="Tu nombre o alias..." 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all placeholder:text-slate-400 text-slate-700">
                <button type="button" onclick="nextStep(2)" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-emerald-600/20 transition-all cursor-pointer">
                    Comenzar registro
                </button>
            </div>

            <div id="step2" class="step-content space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">¿Qué día estás registrando hoy?</label>
                    <select id="dia_registro" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-700 bg-white">
                        <option value="1">Día 1</option>
                        <option value="2">Día 2</option>
                        <option value="3">Día 3</option>
                        <option value="4">Día 4</option>
                        <option value="5">Día 5</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Durante este día, ¿qué tipo de monitoreo experimentaste?</label>
                    <div class="space-y-2">
                        <label class="flex items-center p-3 rounded-xl border border-slate-200 hover:bg-slate-50 cursor-pointer transition-all">
                            <input type="radio" name="tipo_monitoreo" value="Sin monitoreo" checked class="text-emerald-600 focus:ring-emerald-500 h-4 w-4">
                            <span class="ml-3 text-sm text-slate-700 font-medium">Sin monitoreo (A ciegas)</span>
                        </label>
                        <label class="flex items-center p-3 rounded-xl border border-slate-200 hover:bg-slate-50 cursor-pointer transition-all">
                            <input type="radio" name="tipo_monitoreo" value="App convencional" class="text-emerald-600 focus:ring-emerald-500 h-4 w-4">
                            <span class="ml-3 text-sm text-slate-700 font-medium">App de clima convencional</span>
                        </label>
                        <label class="flex items-center p-3 rounded-xl border border-slate-200 hover:bg-slate-50 cursor-pointer transition-all">
                            <input type="radio" name="tipo_monitoreo" value="ECOALERTA" class="text-emerald-600 focus:ring-emerald-500 h-4 w-4">
                            <span class="ml-3 text-sm text-slate-700 font-medium">ECOALERTA (Nuestra propuesta)</span>
                        </label>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button type="button" onclick="prevStep(1)" class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-3 rounded-xl transition-all cursor-pointer">Atrás</button>
                    <button type="button" onclick="nextStep(3)" class="w-2/3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-emerald-600/20 transition-all cursor-pointer">Continuar</button>
                </div>
            </div>

            <div id="step3" class="step-content space-y-4">
                <label class="block text-sm font-semibold text-slate-700 text-center">
                    ¿Cuál fue tu nivel de **Comodidad Térmica Percibida** en este día?
                </label>
                <p class="text-xs text-center text-slate-400">(Donde 1 es muy incómodo y 10 es confort óptimo)</p>
                
                <div class="space-y-2">
                    <input type="range" id="comodidad_termica" min="1" max="10" value="7" 
                        class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-600"
                        oninput="updateRangeValue(this.value)">
                    <div class="text-center">
                        <span id="rangeValue" class="text-3xl font-bold text-emerald-600">7</span>
                        <span class="text-slate-400 font-medium">/ 10</span>
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="prevStep(2)" class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-3 rounded-xl transition-all cursor-pointer">Atrás</button>
                    <button type="button" onclick="nextStep(4)" class="w-2/3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-emerald-600/20 transition-all cursor-pointer">Continuar</button>
                </div>
            </div>

            <div id="step4" class="step-content space-y-4">
                <label class="block text-sm font-semibold text-slate-700">Observaciones o notas adicionales (Opcional):</label>
                <textarea id="observacion" rows="3" placeholder="Ej. Si bien la app marcaba 19°C, se sintió como de 23°C..." 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all placeholder:text-slate-400 text-slate-700 text-sm"></textarea>
                
                <div class="flex gap-3">
                    <button type="button" onclick="prevStep(3)" class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-3 rounded-xl transition-all cursor-pointer">Atrás</button>
                    <button type="submit" id="submitBtn" class="w-2/3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-emerald-600/20 transition-all flex items-center justify-center gap-2 cursor-pointer">
                        Enviar reporte
                    </button>
                </div>
            </div>

            <div id="stepSuccess" class="step-content text-center space-y-4 py-6">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-emerald-100 text-emerald-600">
                    <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">¡Muchas gracias!</h2>
                <p class="text-sm text-slate-500 max-w-xs mx-auto">Tu reporte del día ha sido registrado correctamente.</p>
                <button type="button" onclick="resetSurvey()" class="mt-4 text-sm font-semibold text-emerald-600 hover:text-emerald-700 underline cursor-pointer">
                    Registrar otro día
                </button>
            </div>

        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
